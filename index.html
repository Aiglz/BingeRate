<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>BingeRate</title>

    <link
        rel="stylesheet"
        href="css/sidebar.css"
    >

    <link
        rel="stylesheet"
        href="css/index.css"
    >

    <link 
        rel="stylesheet" 
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet"
    >

</head>

<body>

    <aside class="sidebar">

        <a
            href="index.html"
            class="sidebar-logo"
        >

            <div
                class="sidebar-logo-icon"
            >

                <i
                    class="
                    fa-solid
                    fa-tv
                    "
                ></i>

            </div>

            <span>

                BingeRate

            </span>

        </a>

        <nav class="sidebar-nav">

            <a
                href="index.html"
                class="nav-link active"
            >

                <i
                    class="
                    fa-solid
                    fa-house
                    "
                ></i>

                <span>

                    Accueil

                </span>

            </a>

            <a
                href="pages/series.html"
                class="nav-link"
            >

                <i
                    class="
                    fa-solid
                    fa-film
                    "
                ></i>

                <span>

                    Séries

                </span>

            </a>

            <a
                href="pages/calendar.html"
                class="nav-link"
            >

                <i
                    class="
                    fa-solid
                    fa-calendar-days
                    "
                ></i>

                <span>

                    Calendrier

                </span>

            </a>

            <a
                href="pages/stats.html"
                class="nav-link"
            >

                <i
                    class="
                    fa-solid
                    fa-chart-line
                    "
                ></i>

                <span>

                    Statistiques

                </span>

            </a>

            <a
                href="pages/rankings.html"
                class="nav-link"
            >

                <i
                    class="
                    fa-solid
                    fa-trophy
                    "
                ></i>

                <span>

                    Classements

                </span>

            </a>

        </nav>

    </aside>

    <!-- BACKGROUND -->

    <div class="bg-noise"></div>

    <div class="blur blur-1"></div>
    <div class="blur blur-2"></div>

    <!-- HERO -->

    <main class="hero">

        <!-- LOGO -->

        <h1 class="logo">

            <span>Binge</span><span>Rate</span>

        </h1>

        <!-- TAGLINE -->

        <div class="tagline">

            <p>

                Note chaque

                <span>épisode</span>.

            </p>

            <p>

                Analyse chaque

                <span>saison</span>.

            </p>

            <p>

                Classe tes

                <span>séries</span>.

            </p>

        </div>

        <!-- CTA -->

        <a
            href="pages/series.html"
            class="start-btn"
        >

            <span>

                Commencer

            </span>

            <svg
                width="26"
                height="26"
                viewBox="0 0 24 24"
                fill="none"
            >

                <path
                    d="M5 12H19"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                />

                <path
                    d="M13 6L19 12L13 18"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                />

            </svg>

        </a>

        <!-- GLOW -->

        <div class="button-glow"></div>

        <!-- POSTERS -->

        <section class="posters">

            <div class="poster poster-1">

                <img
                    src="assets/posters/dark.jpg"
                    alt="Dark"
                >

                <span>Dark</span>

            </div>

            <div class="poster poster-2">

                <img
                    src="assets/posters/breakingbad.jpg"
                    alt="Breaking Bad"
                >

                <span>Breaking Bad</span>

            </div>

            <div class="poster poster-3">

                <img
                    src="assets/posters/succession.jpg"
                    alt="Succession"
                >

                <span>Succession</span>

            </div>

            <div class="poster poster-4">

                <img
                    src="assets/posters/sopranos.jpg"
                    alt="The Sopranos"
                >

                <span>The Sopranos</span>

            </div>

            <div class="poster poster-5">

                <img
                    src="assets/posters/severance.jpg"
                    alt="Severance"
                >

                <span>Severance</span>

            </div>

        </section>

        <!-- LIGHT ARCS -->

        <svg
            class="arc arc-1"
            viewBox="0 0 1200 300"
        >

            <path
                d="
                M0 280
                C300 120
                900 120
                1200 280
                "
            />

        </svg>

        <svg
            class="arc arc-2"
            viewBox="0 0 1400 350"
        >

            <path
                d="
                M0 330
                C350 150
                1050 150
                1400 330
                "
            />

        </svg>

    </main>

    <script src="js/index.js"></script>

</body>

</html>
