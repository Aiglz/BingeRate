<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>BingeRate • Calendrier</title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="../css/sidebar.css"
    >

    <link
        rel="stylesheet"
        href="../css/calendar.css"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

</head>

<body>

    <!-- BACKGROUND -->

    <div class="background-glow"></div>

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <a
            href="series.html"
            class="sidebar-logo"
        >

            <div
                class="sidebar-logo-icon"
            >

                <i class="fa-solid fa-tv"></i>

            </div>

            <span>BingeRate</span>

        </a>

        <nav class="sidebar-nav">

            <a
                href="../index.html"
                class="nav-link"
            >

                <i
                    class="
                    fa-solid
                    fa-house
                    "
                ></i>

                <span>

                    Accueil

                </span>

            </a>

            <a
                href="series.html"
                class="nav-link"
            >

                <i class="fa-solid fa-film"></i>

                <span>Séries</span>

            </a>

            <a
                href="calendar.html"
                class="nav-link active"
            >

                <i class="fa-solid fa-calendar-days"></i>

                <span>Calendrier</span>

            </a>

            <a
                href="stats.html"
                class="nav-link"
            >

                <i class="fa-solid fa-chart-line"></i>

                <span>Statistiques</span>

            </a>

            <a
                href="rankings.html"
                class="nav-link"
            >

                <i
                    class="
                    fa-solid
                    fa-trophy
                    "
                ></i>

                <span>

                    Classements

                </span>

            </a>

                        <a
                href="settings.html"
                class="nav-link"
            >
            
                <i
                    class="
                    fa-solid
                    fa-trophy
                    "             
                ></i>

                <span>

                    Paramètres

                </span>

            </a>

        </nav>

    </aside>

    <!-- PAGE -->

    <main class="calendar-page">

        <!-- HEADER -->

        <section
            class="calendar-header"
        >

            <div>

                <div
                    class="calendar-tag"
                >

                    <i class="fa-solid fa-bolt"></i>

                    CALENDRIER

                </div>

                <h1>

                    Vos prochaines
                    sorties séries

                </h1>

                <p>

                    Suivez les prochains
                    épisodes des séries
                    présentes dans votre
                    collection.

                </p>

            </div>

        </section>

        <!-- TODAY -->

        <section
            class="calendar-section"
        >

            <div
                class="section-title"
            >

                <i class="fa-solid fa-fire"></i>

                Aujourd'hui

            </div>

            <div
                id="todayContainer"
                class="episodes-grid"
            >

                <!-- JS -->

            </div>

        </section>

        <!-- THIS WEEK -->

        <section
            class="calendar-section"
        >

            <div
                class="section-title"
            >

                <i
                    class="
                    fa-solid
                    fa-calendar-week
                    "
                ></i>

                Cette semaine

            </div>

            <div
                id="weekContainer"
                class="episodes-grid"
            >

                <!-- JS -->

            </div>

        </section>

        <!-- UPCOMING -->

        <section
            class="calendar-section"
        >

            <div
                class="section-title"
            >

                <i
                    class="
                    fa-solid
                    fa-clock
                    "
                ></i>

                Plus tard

            </div>

            <div
                id="futureContainer"
                class="episodes-grid"
            >

                <!-- JS -->

            </div>

        </section>

    </main>

    <!-- TEMPLATE CARD -->

    <template
        id="episodeTemplate"
    >

        <div
            class="episode-card"
        >

            <img
                class="episode-poster"
            >

            <div
                class="episode-content"
            >

                <h3
                    class="episode-series"
                ></h3>

                <div
                    class="episode-code"
                ></div>

                <div
                    class="episode-title"
                ></div>

                <div
                    class="episode-date"
                ></div>

            </div>

        </div>

    </template>

    <script src="../config.js"></script>

    <script src="../js/calendar.js"></script>

</body>

</html>
